# Fly.io config for the Macronomics API — EU/Zurich, scale-to-zero (ADR-0001).
# Deploy (from repo root, once `fly` is authed):
#   fly launch --no-deploy --copy-config --config services/api/fly.toml   # first time
#   fly secrets set DATABASE_URL="postgres://…pooler.supabase.com:6543/postgres"
#   fly deploy --config services/api/fly.toml --dockerfile services/api/Dockerfile
app = "macronomics-api"
primary_region = "zrh"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0           # scale to zero; set to 1 to avoid cold starts

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "2s"
  grace_period = "5s"

[env]
  PORT = "8787"
