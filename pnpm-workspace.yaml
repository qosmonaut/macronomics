# pnpm workspace definition.
# Real packages live under these globs; placeholder directories that only
# contain a README (no package.json) are ignored until their milestone.
packages:
  - "apps/*"
  - "services/*"
  - "packages/*"
  - "spikes/*"

# Allow build scripts only for vetted dependencies (pnpm blocks them by default).
# esbuild ships a prebuilt binary used by some dev tooling (e.g. drizzle-kit).
allowBuilds:
  esbuild: true
